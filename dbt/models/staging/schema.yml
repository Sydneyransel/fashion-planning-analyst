version: 2

sources:
  - name: raw
    database: SKIMS_ANALYTICS
    schema: RAW
    tables:
      - name: GOOGLE_TRENDS_WEEKLY

models:
  - name: stg_google_trends
    description: "Cleaned Google Trends weekly interest data"
    columns:
      - name: keyword
        tests:
          - not_null
      - name: week_start
        tests:
          - not_null
      - name: interest_score
        tests:
          - not_null
