name: Extract SKIMS Knowledge Sources

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 6 AM UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Scrape SKIMS sources
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python pipeline/extract_skims.py

      - name: Commit updated sources
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add knowledge/raw/
          git diff --staged --quiet || git commit -m "chore: refresh knowledge/raw sources [automated]"
          git push
